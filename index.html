<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ste.arttts</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #9c450a, #d66e2c);
            color: #fce8d5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #fce8d5;
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .description-line-1 {
            font-size: 1.05rem;
            margin-bottom: 5px;
            line-height: 1.4;
            font-weight: 600;
            color: #f8d4b5;
        }
        .description-line-2 {
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.4;
            color: #f8d4b5;
        }
        .link {
            display: block;
            color: #fce8d5;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #fce8d5;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .link:hover {
            background: #fce8d5;
            color: #9c450a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Certifique-se de que o arquivo se chame image.jpg -->
        <img src="image.jpg" alt="Logo ste.arttts" class="profile-pic">
